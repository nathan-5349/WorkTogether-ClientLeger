name: PR E2E (Playwright) - Symfony WorkTogether

on:
  pull_request:
    branches: [ test-ci ]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: worktogether
          #MYSQL_USER: root
         # MYSQL_PASSWORD: root
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Prepare env test
        run: |
          cp .env.test .env.test.local || true
          echo 'APP_ENV=test' >> .env.test.local
          echo 'DATABASE_URL="mysql://root:root@127.0.0.1:3306/worktogether_test?serverVersion=8.0"' >> .env.test.local

      - name: Migrate database
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Load fixtures (optional)
        run: php bin/console doctrine:fixtures:load --no-interaction --env=test
        continue-on-error: true

      - name: Start Symfony server
        run: |
          symfony server:start --no-tls --port=8000 >/tmp/symfony-server.log 2>&1 &
          sleep 2

      - name: Run Playwright E2E
        env:
          E2E_BASE_URL: http://127.0.0.1:8000
        run: npx playwright test

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report